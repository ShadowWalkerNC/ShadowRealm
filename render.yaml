# render.yaml — Render deployment blueprint for ShadowRealm (Odysseus fork)
# Deploy: Render dashboard → New → Blueprint → connect this repo

services:
  - type: web
    name: shadowrealm
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Render injects $PORT. The Dockerfile CMD hardcodes 7000, so we override
    # it here to honour $PORT. The entrypoint (gosu) passes "$@" through, so
    # this becomes the actual uvicorn command.
    dockerCommand: >-
      uvicorn app:app
      --host 0.0.0.0
      --port ${PORT:-8080}
      --workers 1
      --timeout-keep-alive 120
    plan: starter        # free tier lacks persistent disk + spins down
    region: oregon
    healthCheckPath: /api/health
    disk:
      name: shadowrealm-data
      mountPath: /app/data
      sizeGB: 2
    envVars:
      # ── Required: fill these in Render dashboard → Environment ──────────────
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      # ── Render injects PORT automatically — do not set manually ─────────────
      # ── Tell the app where its data lives (matches disk mountPath above) ────
      - key: ODYSSEUS_DATA_DIR
        value: /app/data
      # ── Internal loopback calls (agent tools → own API) ──────────────────────
      # Must match the PORT Render injects. Using 8080 as the safe default;
      # on Render the actual port is always $PORT which uvicorn is bound to.
      - key: APP_PORT
        value: "8080"
      - key: ODYSSEUS_INTERNAL_BASE
        value: http://127.0.0.1:8080
      # ── CORS: allow the browser client on the Render public URL ──────────────
      # Replace <your-app-name> with your actual Render service name.
      # Format: https://shadowrealm.onrender.com  (no trailing slash)
      - key: ALLOWED_ORIGINS
        sync: false      # set in Render dashboard after first deploy
      # ── App public URL (used for webhook callbacks, email deep-links) ────────
      - key: APP_PUBLIC_URL
        fromService:
          type: web
          name: shadowrealm
          property: host
      # ── Auth ─────────────────────────────────────────────────────────────────
      - key: AUTH_ENABLED
        value: "true"
      # ── Optional: pre-seed an LLM key so the model picker works on boot ─────
      - key: OPENAI_API_KEY
        sync: false
      # ── Logging ──────────────────────────────────────────────────────────────
      - key: PYTHONUNBUFFERED
        value: "1"
      # ── Security: harden session cookies for HTTPS-only Render deploys ───────
      - key: SESSION_COOKIE_SECURE
        value: "true"
